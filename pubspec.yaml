name: tarea_multiapi
description: "Aplicación Flutter multi-vista que consume varias APIs públicas (ITLA)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.1
  audioplayers: ^6.0.0
  url_launcher: ^6.2.6
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

# Configuración para generar el ícono de la app a partir de tu foto.
# 1) Coloca tu foto en assets/images/app_icon.png (cuadrada, 1024x1024 recomendado)
# 2) Ejecuta: flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
